<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Sequencer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 16px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-left: 1px solid #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; border: 4px solid #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* ピアノの鍵盤アニメーション */
        .key-active-white { background-color: #d1d5db !important; }
        .key-active-black { background-color: #374151 !important; }
        
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; border-radius: 10px; height: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #06b6d4; cursor: pointer; margin-top: -5px; }
    </style>
</head>
<body class="bg-gray-950 text-slate-200 select-none flex flex-col h-screen">

    <!-- ツールバー -->
    <div class="h-16 shrink-0 bg-gray-900 border-b border-gray-800 flex items-center px-6 gap-6 shadow-md z-30 relative">
        <div class="flex gap-2">
            <button id="playBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-colors shadow-sm">
                <i data-lucide="play" id="playIcon"></i>
            </button>
            <button id="stopBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-colors shadow-sm">
                <i data-lucide="square" fill="currentColor"></i>
            </button>
        </div>

        <div class="w-px h-8 bg-gray-800"></div>

        <button id="recBtn" class="flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-red-900/40 border-red-500/50 text-red-400">
            <i data-lucide="circle" id="recIcon" fill="currentColor" class="w-4 h-4"></i>
            <span class="font-semibold text-sm tracking-wide" id="recText">REC</span>
        </button>

        <div class="w-px h-8 bg-gray-800"></div>

        <div class="flex items-center gap-4">
            <button id="metroBtn" class="p-2 rounded-lg transition-colors text-cyan-400 bg-cyan-900/30">
                <i data-lucide="bell" class="w-5 h-5"></i>
            </button>
            <div class="flex flex-col w-32">
                <div class="flex justify-between text-xs text-gray-400 mb-1 font-semibold tracking-wider">
                    <span>BPM</span>
                    <span id="bpmDisplay" class="font-mono text-cyan-400">120</span>
                </div>
                <input type="range" id="bpmSlider" min="60" max="200" value="120" class="w-full appearance-none bg-transparent">
            </div>
        </div>

        <button id="configBtn" class="ml-auto p-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 transition-colors shadow-sm">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- 鍵盤エリア (横に3オクターブ・高さは元に戻す) -->
    <div class="h-44 shrink-0 bg-gray-900 border-b-4 border-gray-800 relative z-20 shadow-lg transition-shadow duration-300 overflow-hidden" id="keyboardContainer">
        <!-- JSで鍵盤を生成 -->
    </div>

    <!-- メインエリア (タイムライン) flex-1で残りの高さを自動的に埋める -->
    <div id="timelineContainer" class="flex-1 overflow-y-auto bg-[#0f172a] relative cursor-crosshair custom-scrollbar z-10">
        <div id="timelineContent" class="relative w-full overflow-hidden">
            <!-- グリッド背景 -->
            <div id="gridBg" class="absolute inset-0 pointer-events-none opacity-20"></div>
            <!-- 鍵盤ライン -->
            <div id="columnLines" class="absolute inset-0 pointer-events-none"></div>
            <!-- ノート描画領域 -->
            <div id="notesLayer" class="absolute inset-0 pointer-events-none"></div>
            <!-- プレイヘッド -->
            <div id="playhead" class="absolute left-0 right-0 h-[2px] bg-red-500 z-10 pointer-events-none shadow-[0_0_15px_rgba(239,68,68,1)]" style="top: 0;">
                <div class="absolute -top-[5px] -left-1 w-3 h-3 bg-red-500 rounded-full"></div>
                <div id="beatCounter" class="absolute -top-3 right-4 text-xs text-red-100 font-mono font-bold bg-red-900/90 px-2 py-0.5 rounded shadow-md border border-red-700">0.00</div>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="configModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-80 p-6 relative">
            <button id="closeConfig" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i data-lucide="settings" class="w-5 h-5 text-cyan-400"></i>
                音色設定
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">波形 (Oscillator)</label>
                    <select id="waveType" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white outline-none focus:border-cyan-500">
                        <option value="sine">Sine (澄んだ音)</option>
                        <option value="triangle">Triangle (柔らかい)</option>
                        <option value="square">Square (レトロ)</option>
                        <option value="sawtooth">Sawtooth (鋭い)</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold text-gray-300 mb-2">
                        <label>アタック (Attack)</label>
                        <span id="attackVal" class="text-cyan-400">0.05s</span>
                    </div>
                    <input type="range" id="attackSlider" min="0.01" max="0.5" step="0.01" value="0.05" class="w-full appearance-none bg-transparent">
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold text-gray-300 mb-2">
                        <label>リリース (Release)</label>
                        <span id="releaseVal" class="text-cyan-400">2.5s</span>
                    </div>
                    <input type="range" id="releaseSlider" min="0.1" max="5.0" step="0.1" value="2.5" class="w-full appearance-none bg-transparent">
                </div>
            </div>
            <button id="modalOk" class="mt-8 w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded-lg transition-colors">完了</button>
        </div>
    </div>

    <script>
        // --- 設定とデータ ---
        const BEAT_HEIGHT = 60;
        const MIN_BEATS = 300;
        
        // 3オクターブ分の鍵盤データ (C3 = 0, C4 = 12, B5 = 35)
        const START_OCTAVE = 3;
        const NUM_OCTAVES = 3;
        const NOTES =[
            { label: 'C', type: 'white' }, { label: 'C#', type: 'black' },
            { label: 'D', type: 'white' }, { label: 'D#', type: 'black' },
            { label: 'E', type: 'white' },
            { label: 'F', type: 'white' }, { label: 'F#', type: 'black' },
            { label: 'G', type: 'white' }, { label: 'G#', type: 'black' },
            { label: 'A', type: 'white' }, { label: 'A#', type: 'black' },
            { label: 'B', type: 'white' }
        ];

        const VISUAL_KEYS =[];
        let _wIdx = 0;
        for (let oct = 0; oct < NUM_OCTAVES; oct++) {
            for (let i = 0; i < NOTES.length; i++) {
                const n = NOTES[i];
                const offset = oct * 12 + i; // 0 to 35
                if (n.type === 'white') {
                    VISUAL_KEYS.push({ offset, label: n.label, type: 'white', wIdx: _wIdx });
                    _wIdx++;
                } else {
                    VISUAL_KEYS.push({ offset, label: n.label, type: 'black', prevWIdx: _wIdx - 1 });
                }
            }
        }
        
        const TOTAL_WHITE = _wIdx; // 21 (3オクターブ)
        const WHITE_W = 100 / TOTAL_WHITE;
        const BLACK_W = WHITE_W * 0.65;

        // PCキーボードのマッピング (デフォルトは真ん中の C4=12 から)
        const KEY_DEF =[
            { key: 'a', baseOffset: 12 }, { key: 'w', baseOffset: 13 }, { key: 's', baseOffset: 14 },
            { key: 'e', baseOffset: 15 }, { key: 'd', baseOffset: 16 }, { key: 'f', baseOffset: 17 },
            { key: 't', baseOffset: 18 }, { key: 'g', baseOffset: 19 }, { key: 'y', baseOffset: 20 },
            { key: 'h', baseOffset: 21 }, { key: 'u', baseOffset: 22 }, { key: 'j', baseOffset: 23 },
            { key: 'k', baseOffset: 24 }, { key: 'o', baseOffset: 25 }, { key: 'l', baseOffset: 26 },
            { key: 'p', baseOffset: 27 }, { key: ';', baseOffset: 28 }
        ];

        // SHIFT記号化バグ防止用
        const CODE_MAP = {
            'KeyA': 'a', 'KeyW': 'w', 'KeyS': 's', 'KeyE': 'e', 'KeyD': 'd', 'KeyF': 'f',
            'KeyT': 't', 'KeyG': 'g', 'KeyY': 'y', 'KeyH': 'h', 'KeyU': 'u', 'KeyJ': 'j',
            'KeyK': 'k', 'KeyO': 'o', 'KeyL': 'l', 'KeyP': 'p', 'Semicolon': ';'
        };

        let state = {
            isPlaying: false,
            isRecording: true,
            metronomeOn: true,
            tempo: 120,
            currentBeat: 0,
            octaveShift: 0,
            synth: { type: 'sine', attack: 0.05, release: 2.5 },
            notes:[]
        };

        const activeRecording = {};
        const activeMouseRecording = {};
        let audioCtx = null;
        let schedulerId = null;
        let engine = { startTime: 0, startBeat: 0, nextMetro: 0, nextNoteIdx: 0 };

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initKeyboard();
            initTimeline();
            setupEvents();
            requestAnimationFrame(uiLoop);
        });

        function initKeyboard() {
            const container = document.getElementById('keyboardContainer');
            container.innerHTML = '';
            
            VISUAL_KEYS.forEach(vk => {
                const el = document.createElement('div');
                el.id = `vis-key-${vk.offset}`;
                el.onmousedown = () => playMouse(vk.offset);
                el.onmouseup = () => stopMouse(vk.offset);
                el.onmouseleave = () => stopMouse(vk.offset);
                
                if (vk.type === 'white') {
                    el.className = `absolute top-0 bottom-0 border-r border-gray-300 transition-colors duration-75 flex flex-col items-center justify-end pb-2 bg-slate-50 cursor-pointer hover:bg-slate-200 z-0`;
                    el.style.left = `${vk.wIdx * WHITE_W}%`;
                    el.style.width = `${WHITE_W}%`;
                    el.innerHTML = `
                        <span class="note-label text-[10px] font-bold text-gray-400 select-none pointer-events-none">${vk.label}${START_OCTAVE + Math.floor(vk.offset/12)}</span>
                        <span class="pc-key-label text-sm font-black text-cyan-600 mt-1 h-5 select-none pointer-events-none"></span>
                    `;
                } else {
                    el.className = `absolute top-0 rounded-b-md transition-colors duration-75 flex flex-col items-center justify-end pb-2 bg-gray-800 border-x border-b border-gray-950 h-[60%] cursor-pointer hover:bg-gray-700 z-10 shadow-sm`;
                    el.style.left = `${(vk.prevWIdx + 1) * WHITE_W - (BLACK_W / 2)}%`;
                    el.style.width = `${BLACK_W}%`;
                    el.innerHTML = `
                        <span class="pc-key-label text-xs font-bold text-cyan-400 h-4 select-none pointer-events-none"></span>
                    `;
                }
                container.appendChild(el);
            });
            updateKeyboardLabels();
        }

        function updateKeyboardLabels() {
            // 全クリア
            VISUAL_KEYS.forEach(vk => {
                const el = document.getElementById(`vis-key-${vk.offset}`);
                if (el) {
                    const pcLabel = el.querySelector('.pc-key-label');
                    if (pcLabel) pcLabel.textContent = '';
                    // 以前の色を消す
                    el.classList.remove('bg-blue-100', 'bg-red-100', 'bg-blue-900', 'bg-red-900');
                }
            });

            // 現在のシフトに応じてPCキーラベルを表示
            KEY_DEF.forEach(k => {
                const absOffset = k.baseOffset + state.octaveShift * 12;
                const visKey = VISUAL_KEYS.find(vk => vk.offset === absOffset);
                if (visKey) {
                    const el = document.getElementById(`vis-key-${absOffset}`);
                    if (el) {
                        const pcLabel = el.querySelector('.pc-key-label');
                        if (pcLabel) pcLabel.textContent = k.key.toUpperCase();
                        
                        // SHIFT中の色付けエフェクト
                        if (state.octaveShift === -1) {
                            el.classList.add(visKey.type === 'white' ? 'bg-blue-100' : 'bg-blue-900');
                        } else if (state.octaveShift === 1) {
                            el.classList.add(visKey.type === 'white' ? 'bg-red-100' : 'bg-red-900');
                        }
                    }
                }
            });
        }

        function initTimeline() {
            const content = document.getElementById('timelineContent');
            content.style.height = `${MIN_BEATS * BEAT_HEIGHT}px`;
            
            const grid = document.getElementById('gridBg');
            grid.style.backgroundSize = `100% ${BEAT_HEIGHT}px, 100% ${BEAT_HEIGHT / 4}px`;
            grid.style.backgroundImage = `linear-gradient(to bottom, #334155 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px)`;

            const lines = document.getElementById('columnLines');
            lines.innerHTML = '';
            VISUAL_KEYS.forEach(vk => {
                const l = document.createElement('div');
                const isWhite = vk.type === 'white';
                l.className = `absolute top-0 bottom-0 border-l ${isWhite ? 'border-gray-800/50' : 'border-gray-800 bg-gray-900/40'}`;
                l.style.left = isWhite ? `${vk.wIdx * WHITE_W}%` : `${(vk.prevWIdx + 1) * WHITE_W - (BLACK_W / 2)}%`;
                l.style.width = isWhite ? `${WHITE_W}%` : `${BLACK_W}%`;
                lines.appendChild(l);
            });
        }

        // --- 音声エンジン ---
        const getCtx = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        function getFreqFromOffset(offset) {
            return 261.63 * Math.pow(2, (offset - 12) / 12); // offset 12 = C4
        }

        function playHarp(freq, time) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = state.synth.type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.8, time + state.synth.attack);
            gain.gain.setValueAtTime(0.8, time + state.synth.attack);
            gain.gain.exponentialRampToValueAtTime(0.001, time + state.synth.release);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + state.synth.release);
        }

        function playPreview() {
            if (!audioCtx) return;
            playHarp(261.63, audioCtx.currentTime); // C4でテスト
        }

        function playClick(time, primary) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = primary ? 1200 : 800;
            osc.type = 'square';
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.3, time + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.05);
        }

        function scheduler() {
            if (!state.isPlaying) return;
            const now = audioCtx.currentTime;
            const lookahead = 0.1;
            const beatPerSec = state.tempo / 60;
            const currBeat = engine.startBeat + (now - engine.startTime) * beatPerSec;

            if (state.metronomeOn) {
                while (engine.nextMetro < currBeat + lookahead * beatPerSec) {
                    const t = engine.startTime + (engine.nextMetro - engine.startBeat) / beatPerSec;
                    playClick(t, engine.nextMetro % 4 === 0);
                    engine.nextMetro++;
                }
            }

            while (engine.nextNoteIdx < state.notes.length) {
                const n = state.notes[engine.nextNoteIdx];
                if (n.start >= currBeat + lookahead * beatPerSec) break;
                if (!n._skipScheduler) {
                    const t = engine.startTime + (n.start - engine.startBeat) / beatPerSec;
                    playHarp(n.freq, t);
                }
                engine.nextNoteIdx++;
            }
            schedulerId = setTimeout(scheduler, 25);
        }

        function uiLoop() {
            if (state.isPlaying && audioCtx) {
                const now = audioCtx.currentTime;
                state.currentBeat = engine.startBeat + (now - engine.startTime) * (state.tempo / 60);
                const container = document.getElementById('timelineContainer');
                const py = state.currentBeat * BEAT_HEIGHT;
                container.scrollTop = py - container.clientHeight / 2;
            }
            document.getElementById('playhead').style.top = `${state.currentBeat * BEAT_HEIGHT}px`;
            document.getElementById('beatCounter').textContent = state.currentBeat.toFixed(2);
            requestAnimationFrame(uiLoop);
        }

        function drawNotes() {
            const layer = document.getElementById('notesLayer');
            layer.innerHTML = '';
            state.notes.forEach(n => {
                if (n.absOffset === undefined) return;
                const visKey = VISUAL_KEYS.find(vk => vk.offset === n.absOffset);
                if (!visKey) return;
                
                const isWhite = visKey.type === 'white';
                const left = isWhite ? `${visKey.wIdx * WHITE_W}%` : `${(visKey.prevWIdx + 1) * WHITE_W - (BLACK_W / 2)}%`;
                const width = isWhite ? `${WHITE_W}%` : `${BLACK_W}%`;
                
                const el = document.createElement('div');
                el.className = `absolute rounded-md border ${isWhite ? 'bg-cyan-500/80 border-cyan-300 shadow-[0_0_12px_rgba(6,182,212,0.6)]' : 'bg-indigo-500/80 border-indigo-300 shadow-[0_0_12px_rgba(99,102,241,0.6)]'}`;
                el.style.top = `${n.start * BEAT_HEIGHT}px`;
                el.style.height = `${n.dur * BEAT_HEIGHT}px`;
                el.style.left = left;
                el.style.width = width;
                el.style.minHeight = '4px';
                layer.appendChild(el);
            });
        }

        // --- マウス操作用関数 ---
        window.playMouse = function(offset) {
            getCtx();
            if (activeMouseRecording[offset]) return; // 連続発音防止
            
            const freq = getFreqFromOffset(offset);
            playHarp(freq, audioCtx.currentTime);
            
            const keyEl = document.getElementById(`vis-key-${offset}`);
            if (keyEl) {
                const isWhite = VISUAL_KEYS.find(v => v.offset === offset).type === 'white';
                keyEl.classList.add(isWhite ? 'key-active-white' : 'key-active-black');
            }
            
            if (state.isRecording) {
                activeMouseRecording[offset] = { start: state.currentBeat, time: audioCtx.currentTime, freq, absOffset: offset };
            }
        };

        window.stopMouse = function(offset) {
            const keyEl = document.getElementById(`vis-key-${offset}`);
            if (keyEl) keyEl.classList.remove('key-active-white', 'key-active-black');
            
            if (activeMouseRecording[offset]) {
                const rec = activeMouseRecording[offset];
                const dur = Math.max(0.15, (audioCtx.currentTime - rec.time) * (state.tempo / 60));
                const newNote = { id: Date.now() + Math.random(), start: rec.start, dur, freq: rec.freq, absOffset: offset };
                
                if (state.isPlaying) newNote._skipScheduler = true;
                
                state.notes.push(newNote);
                delete activeMouseRecording[offset];
                drawNotes();
            }
        };

        // --- イベント処理 ---
        function setupEvents() {
            document.getElementById('playBtn').onclick = () => {
                getCtx();
                if (!state.isPlaying) {
                    state.isPlaying = true;
                    engine.startTime = audioCtx.currentTime;
                    engine.startBeat = state.currentBeat;
                    engine.nextMetro = Math.ceil(state.currentBeat);
                    state.notes.forEach(n => n._skipScheduler = false);
                    state.notes.sort((a, b) => a.start - b.start);
                    engine.nextNoteIdx = state.notes.findIndex(n => n.start >= state.currentBeat);
                    if (engine.nextNoteIdx === -1) engine.nextNoteIdx = state.notes.length;
                    document.getElementById('playIcon').setAttribute('data-lucide', 'pause');
                    lucide.createIcons();
                    scheduler();
                } else {
                    state.isPlaying = false;
                    clearTimeout(schedulerId);
                    document.getElementById('playIcon').setAttribute('data-lucide', 'play');
                    lucide.createIcons();
                }
            };

            document.getElementById('stopBtn').onclick = () => {
                state.isPlaying = false;
                clearTimeout(schedulerId);
                document.getElementById('playIcon').setAttribute('data-lucide', 'play');
                lucide.createIcons();
            };

            document.getElementById('recBtn').onclick = () => {
                state.isRecording = !state.isRecording;
                const btn = document.getElementById('recBtn');
                const text = document.getElementById('recText');
                if (state.isRecording) {
                    btn.className = "flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-red-900/40 border-red-500/50 text-red-400";
                    text.textContent = "REC";
                } else {
                    btn.className = "flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-gray-800 border-gray-700 text-gray-400";
                    text.textContent = "LOCKED";
                }
            };

            document.getElementById('bpmSlider').oninput = (e) => {
                state.tempo = parseInt(e.target.value);
                document.getElementById('bpmDisplay').textContent = state.tempo;
            };

            document.getElementById('metroBtn').onclick = () => {
                state.metronomeOn = !state.metronomeOn;
                document.getElementById('metroBtn').className = state.metronomeOn ? "p-2 rounded-lg transition-colors text-cyan-400 bg-cyan-900/30" : "p-2 rounded-lg transition-colors text-gray-500 hover:bg-gray-800";
            };

            document.getElementById('timelineContainer').onclick = (e) => {
                if (state.isPlaying) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const y = e.clientY - rect.top + e.currentTarget.scrollTop;
                state.currentBeat = Math.max(0, y / BEAT_HEIGHT);
            };

            window.onkeydown = (e) => {
                if (e.repeat) return;
                if (e.code === 'ShiftLeft') { state.octaveShift = -1; updateKeyboardLabels(); return; }
                if (e.code === 'ShiftRight') { state.octaveShift = 1; updateKeyboardLabels(); return; }

                const keyStr = CODE_MAP[e.code];
                if (!keyStr || activeRecording[keyStr]) return;

                const k = KEY_DEF.find(kd => kd.key === keyStr);
                if (!k) return;
                
                const absOffset = k.baseOffset + state.octaveShift * 12;
                getCtx();
                const freq = getFreqFromOffset(absOffset);
                playHarp(freq, audioCtx.currentTime);
                
                const keyEl = document.getElementById(`vis-key-${absOffset}`);
                if (keyEl) {
                    const isWhite = VISUAL_KEYS.find(v => v.offset === absOffset).type === 'white';
                    keyEl.classList.add(isWhite ? 'key-active-white' : 'key-active-black');
                }

                if (state.isRecording) {
                    activeRecording[keyStr] = { start: state.currentBeat, time: audioCtx.currentTime, freq, absOffset };
                }
            };

            window.onkeyup = (e) => {
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { state.octaveShift = 0; updateKeyboardLabels(); return; }
                
                const keyStr = CODE_MAP[e.code];
                if (!keyStr) return;

                if (activeRecording[keyStr]) {
                    const rec = activeRecording[keyStr];
                    const keyEl = document.getElementById(`vis-key-${rec.absOffset}`);
                    if (keyEl) keyEl.classList.remove('key-active-white', 'key-active-black');

                    const dur = Math.max(0.15, (audioCtx.currentTime - rec.time) * (state.tempo / 60));
                    const newNote = { id: Date.now(), start: rec.start, dur, freq: rec.freq, absOffset: rec.absOffset };
                    
                    if (state.isPlaying) newNote._skipScheduler = true;
                    
                    state.notes.push(newNote);
                    delete activeRecording[keyStr];
                    drawNotes();
                }
            };

            // 設定
            document.getElementById('configBtn').onclick = () => { getCtx(); document.getElementById('configModal').classList.remove('hidden'); };
            document.getElementById('closeConfig').onclick = () => document.getElementById('configModal').classList.add('hidden');
            document.getElementById('modalOk').onclick = () => document.getElementById('configModal').classList.add('hidden');
            
            // 設定変更時プレビュー
            document.getElementById('waveType').onchange = (e) => { state.synth.type = e.target.value; playPreview(); };
            
            const atkSlider = document.getElementById('attackSlider');
            atkSlider.oninput = (e) => {
                state.synth.attack = parseFloat(e.target.value);
                document.getElementById('attackVal').textContent = e.target.value + 's';
            };
            atkSlider.onchange = () => playPreview(); // スライダーを離した時に音を鳴らす

            const relSlider = document.getElementById('releaseSlider');
            relSlider.oninput = (e) => {
                state.synth.release = parseFloat(e.target.value);
                document.getElementById('releaseVal').textContent = e.target.value + 's';
            };
            relSlider.onchange = () => playPreview(); // スライダーを離した時に音を鳴らす
        }
    </script>
</body>
</html>
