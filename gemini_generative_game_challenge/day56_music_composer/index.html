<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Sequencer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 16px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-left: 1px solid #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; border: 4px solid #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* ピアノの鍵盤アニメーション */
        .key-active-white { background-color: #d1d5db !important; }
        .key-active-black { background-color: #374151 !important; height: 62% !important; }
        
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; border-radius: 10px; height: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #06b6d4; cursor: pointer; margin-top: -5px; }
    </style>
</head>
<body class="bg-gray-950 text-slate-200 select-none">

    <!-- ツールバー -->
    <div class="h-16 bg-gray-900 border-b border-gray-800 flex items-center px-6 gap-6 shadow-md z-30 relative">
        <div class="flex gap-2">
            <button id="playBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-colors shadow-sm">
                <i data-lucide="play" id="playIcon"></i>
            </button>
            <button id="stopBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-colors shadow-sm">
                <i data-lucide="square" fill="currentColor"></i>
            </button>
        </div>

        <div class="w-px h-8 bg-gray-800"></div>

        <button id="recBtn" class="flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-red-900/40 border-red-500/50 text-red-400">
            <i data-lucide="circle" id="recIcon" fill="currentColor" class="w-4 h-4"></i>
            <span class="font-semibold text-sm tracking-wide" id="recText">REC</span>
        </button>

        <div class="w-px h-8 bg-gray-800"></div>

        <div class="flex items-center gap-4">
            <button id="metroBtn" class="p-2 rounded-lg transition-colors text-cyan-400 bg-cyan-900/30">
                <i data-lucide="bell" class="w-5 h-5"></i>
            </button>
            <div class="flex flex-col w-32">
                <div class="flex justify-between text-xs text-gray-400 mb-1 font-semibold tracking-wider">
                    <span>BPM</span>
                    <span id="bpmDisplay" class="font-mono text-cyan-400">120</span>
                </div>
                <input type="range" id="bpmSlider" min="60" max="200" value="120" class="w-full appearance-none bg-transparent">
            </div>
        </div>

        <button id="configBtn" class="ml-auto p-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 transition-colors shadow-sm">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- 鍵盤エリア -->
    <div class="h-44 bg-gray-900 border-b-4 border-gray-800 relative z-20 shadow-lg" id="keyboardContainer">
        <!-- JSで鍵盤を生成 -->
    </div>

    <!-- メインエリア (タイムライン) -->
    <div id="timelineContainer" class="flex-1 overflow-y-auto bg-[#0f172a] relative cursor-crosshair custom-scrollbar z-10" style="height: calc(100vh - 16rem);">
        <div id="timelineContent" class="relative w-full overflow-hidden">
            <!-- グリッド背景 -->
            <div id="gridBg" class="absolute inset-0 pointer-events-none opacity-20"></div>
            <!-- 鍵盤ライン -->
            <div id="columnLines" class="absolute inset-0 pointer-events-none"></div>
            <!-- ノート描画領域 -->
            <div id="notesLayer" class="absolute inset-0 pointer-events-none"></div>
            <!-- プレイヘッド -->
            <div id="playhead" class="absolute left-0 right-0 h-[2px] bg-red-500 z-10 pointer-events-none shadow-[0_0_15px_rgba(239,68,68,1)]" style="top: 0;">
                <div class="absolute -top-[5px] -left-1 w-3 h-3 bg-red-500 rounded-full"></div>
                <div id="beatCounter" class="absolute -top-3 right-4 text-xs text-red-100 font-mono font-bold bg-red-900/90 px-2 py-0.5 rounded shadow-md border border-red-700">0.00</div>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="configModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-80 p-6 relative">
            <button id="closeConfig" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i data-lucide="settings" class="w-5 h-5 text-cyan-400"></i>
                音色設定
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">波形 (Oscillator)</label>
                    <select id="waveType" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white outline-none focus:border-cyan-500">
                        <option value="sine">Sine (澄んだ音)</option>
                        <option value="triangle">Triangle (柔らかい)</option>
                        <option value="square">Square (レトロ)</option>
                        <option value="sawtooth">Sawtooth (鋭い)</option>
                    </select>
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold text-gray-300 mb-2">
                        <label>アタック (Attack)</label>
                        <span id="attackVal" class="text-cyan-400">0.05s</span>
                    </div>
                    <input type="range" id="attackSlider" min="0.01" max="0.5" step="0.01" value="0.05" class="w-full appearance-none bg-transparent">
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold text-gray-300 mb-2">
                        <label>リリース (Release)</label>
                        <span id="releaseVal" class="text-cyan-400">2.5s</span>
                    </div>
                    <input type="range" id="releaseSlider" min="0.1" max="5.0" step="0.1" value="2.5" class="w-full appearance-none bg-transparent">
                </div>
            </div>
            <button id="modalOk" class="mt-8 w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded-lg transition-colors">完了</button>
        </div>
    </div>

    <script>
        // --- 設定とデータ ---
        const BEAT_HEIGHT = 60;
        const MIN_BEATS = 300;
        const KEY_DEF = [
            { key: 'a', type: 'white', offset: 0, wIdx: 0, label: 'C' },
            { key: 'w', type: 'black', offset: 1, cIdx: 1, label: 'C#' },
            { key: 's', type: 'white', offset: 2, wIdx: 1, label: 'D' },
            { key: 'e', type: 'black', offset: 3, cIdx: 2, label: 'D#' },
            { key: 'd', type: 'white', offset: 4, wIdx: 2, label: 'E' },
            { key: 'f', type: 'white', offset: 5, wIdx: 3, label: 'F' },
            { key: 't', type: 'black', offset: 6, cIdx: 4, label: 'F#' },
            { key: 'g', type: 'white', offset: 7, wIdx: 4, label: 'G' },
            { key: 'y', type: 'black', offset: 8, cIdx: 5, label: 'G#' },
            { key: 'h', type: 'white', offset: 9, wIdx: 5, label: 'A' },
            { key: 'u', type: 'black', offset: 10, cIdx: 6, label: 'A#' },
            { key: 'j', type: 'white', offset: 11, wIdx: 6, label: 'B' },
            { key: 'k', type: 'white', offset: 12, wIdx: 7, label: 'C' },
            { key: 'o', type: 'black', offset: 13, cIdx: 8, label: 'C#' },
            { key: 'l', type: 'white', offset: 14, wIdx: 8, label: 'D' },
            { key: 'p', type: 'black', offset: 15, cIdx: 9, label: 'D#' },
            { key: ';', type: 'white', offset: 16, wIdx: 9, label: 'E' }
        ];

        let state = {
            isPlaying: false,
            isRecording: true,
            metronomeOn: true,
            tempo: 120,
            currentBeat: 0,
            octaveShift: 0,
            synth: { type: 'sine', attack: 0.05, release: 2.5 },
            notes: []
        };

        const activeRecording = {};
        let audioCtx = null;
        let schedulerId = null;
        let rafId = null;
        let engine = { startTime: 0, startBeat: 0, nextMetro: 0, nextNoteIdx: 0 };

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initKeyboard();
            initTimeline();
            setupEvents();
            requestAnimationFrame(uiLoop);
        });

        function initKeyboard() {
            const container = document.getElementById('keyboardContainer');
            KEY_DEF.forEach(k => {
                const el = document.createElement('div');
                // IDに特殊文字が含まれても安全なように data-key 属性も持たせる
                el.id = `key-${k.key}`;
                el.setAttribute('data-note-key', k.key);
                if (k.type === 'white') {
                    el.className = `absolute top-0 bottom-0 border-r border-l border-gray-300 rounded-b-lg transition-colors duration-75 flex flex-col items-center justify-end pb-4 bg-slate-50 cursor-pointer`;
                    el.style.left = `${k.wIdx * 10}%`;
                    el.style.width = '10%';
                    el.style.zIndex = '0';
                    el.innerHTML = `<span class="note-label text-xs font-bold mb-1 text-gray-400"></span><span class="text-lg font-black text-gray-400">${k.key.toUpperCase()}</span>`;
                } else {
                    el.className = `absolute top-0 rounded-b-lg transition-colors duration-75 flex flex-col items-center justify-end pb-3 bg-gray-800 border-x border-b border-gray-950 h-[60%] cursor-pointer`;
                    el.style.left = `${k.cIdx * 10 - 3}%`;
                    el.style.width = '6%';
                    el.style.zIndex = '10';
                    el.innerHTML = `<span class="note-label text-[10px] font-bold mb-1 text-gray-500"></span><span class="text-sm font-bold text-gray-400">${k.key.toUpperCase()}</span>`;
                }
                container.appendChild(el);
            });
            updateKeyboardLabels();
        }

        function updateKeyboardLabels() {
            KEY_DEF.forEach(k => {
                const octave = 4 + state.octaveShift + Math.floor(k.offset / 12);
                // 特殊文字対策として [id="..."] 形式か getElementById を使用する
                const labelEl = document.getElementById(`key-${k.key}`).querySelector('.note-label');
                if (labelEl) labelEl.textContent = `${k.label}${octave}`;
            });
        }

        function initTimeline() {
            const content = document.getElementById('timelineContent');
            content.style.height = `${MIN_BEATS * BEAT_HEIGHT}px`;
            
            const grid = document.getElementById('gridBg');
            grid.style.backgroundSize = `100% ${BEAT_HEIGHT}px, 100% ${BEAT_HEIGHT / 4}px`;
            grid.style.backgroundImage = `linear-gradient(to bottom, #334155 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px)`;

            const lines = document.getElementById('columnLines');
            KEY_DEF.forEach(k => {
                const l = document.createElement('div');
                l.className = `absolute top-0 bottom-0 border-l ${k.type === 'black' ? 'border-gray-800 bg-gray-900/40' : 'border-gray-800/50'}`;
                l.style.left = k.type === 'white' ? `${k.wIdx * 10}%` : `${k.cIdx * 10 - 3}%`;
                l.style.width = k.type === 'white' ? '10%' : '6%';
                lines.appendChild(l);
            });
        }

        // --- 音声エンジン ---
        function getFreq(offset, shift) {
            const C4 = 261.63;
            const steps = shift * 12 + offset;
            return C4 * Math.pow(2, steps / 12);
        }

        function playHarp(freq, time) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = state.synth.type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.8, time + state.synth.attack);
            gain.gain.exponentialRampToValueAtTime(0.001, time + state.synth.release);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + state.synth.release);
        }

        function playClick(time, primary) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = primary ? 1200 : 800;
            osc.type = 'square';
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.3, time + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.05);
        }

        function scheduler() {
            if (!state.isPlaying) return;
            const now = audioCtx.currentTime;
            const lookahead = 0.1;
            const beatPerSec = state.tempo / 60;
            const currBeat = engine.startBeat + (now - engine.startTime) * beatPerSec;

            // メトロノーム
            if (state.metronomeOn) {
                while (engine.nextMetro < currBeat + lookahead * beatPerSec) {
                    const t = engine.startTime + (engine.nextMetro - engine.startBeat) / beatPerSec;
                    playClick(t, engine.nextMetro % 4 === 0);
                    engine.nextMetro++;
                }
            }

            // 再生
            while (engine.nextNoteIdx < state.notes.length && state.notes[engine.nextNoteIdx].start < currBeat + lookahead * beatPerSec) {
                const n = state.notes[engine.nextNoteIdx];
                const t = engine.startTime + (n.start - engine.startBeat) / beatPerSec;
                playHarp(n.freq, t);
                engine.nextNoteIdx++;
            }

            schedulerId = setTimeout(scheduler, 25);
        }

        // --- イベントループ ---
        function uiLoop() {
            if (state.isPlaying && audioCtx) {
                const now = audioCtx.currentTime;
                state.currentBeat = engine.startBeat + (now - engine.startTime) * (state.tempo / 60);
                
                // 自動スクロール
                const container = document.getElementById('timelineContainer');
                const py = state.currentBeat * BEAT_HEIGHT;
                container.scrollTop = py - container.clientHeight / 2;
            }
            
            document.getElementById('playhead').style.top = `${state.currentBeat * BEAT_HEIGHT}px`;
            document.getElementById('beatCounter').textContent = state.currentBeat.toFixed(2);
            
            requestAnimationFrame(uiLoop);
        }

        // --- ノート描画 ---
        function drawNotes() {
            const layer = document.getElementById('notesLayer');
            layer.innerHTML = '';
            state.notes.forEach(n => {
                const k = KEY_DEF.find(kd => kd.key === n.keyId);
                const el = document.createElement('div');
                el.className = `absolute rounded-md border ${k.type === 'white' ? 'bg-cyan-500/80 border-cyan-300 shadow-[0_0_12px_rgba(6,182,212,0.6)]' : 'bg-indigo-500/80 border-indigo-300 shadow-[0_0_12px_rgba(99,102,241,0.6)]'}`;
                el.style.top = `${n.start * BEAT_HEIGHT}px`;
                el.style.height = `${n.dur * BEAT_HEIGHT}px`;
                el.style.left = k.type === 'white' ? `${k.wIdx * 10 + 0.5}%` : `${k.cIdx * 10 - 2.5}%`;
                el.style.width = k.type === 'white' ? '9%' : '5%';
                el.style.minHeight = '4px';
                layer.appendChild(el);
            });
        }

        // --- イベント処理 ---
        function setupEvents() {
            const getCtx = () => {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            };

            // 再生・停止
            document.getElementById('playBtn').onclick = () => {
                getCtx();
                if (!state.isPlaying) {
                    state.isPlaying = true;
                    engine.startTime = audioCtx.currentTime;
                    engine.startBeat = state.currentBeat;
                    engine.nextMetro = Math.ceil(state.currentBeat);
                    state.notes.sort((a, b) => a.start - b.start);
                    engine.nextNoteIdx = state.notes.findIndex(n => n.start >= state.currentBeat);
                    if (engine.nextNoteIdx === -1) engine.nextNoteIdx = state.notes.length;
                    document.getElementById('playIcon').setAttribute('data-lucide', 'pause');
                    lucide.createIcons();
                    scheduler();
                } else {
                    state.isPlaying = false;
                    clearTimeout(schedulerId);
                    document.getElementById('playIcon').setAttribute('data-lucide', 'play');
                    lucide.createIcons();
                }
            };

            document.getElementById('stopBtn').onclick = () => {
                state.isPlaying = false;
                clearTimeout(schedulerId);
                document.getElementById('playIcon').setAttribute('data-lucide', 'play');
                lucide.createIcons();
            };

            // REC
            document.getElementById('recBtn').onclick = () => {
                state.isRecording = !state.isRecording;
                const btn = document.getElementById('recBtn');
                const text = document.getElementById('recText');
                if (state.isRecording) {
                    btn.className = "flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-red-900/40 border-red-500/50 text-red-400";
                    text.textContent = "REC";
                } else {
                    btn.className = "flex items-center gap-2 px-4 h-10 rounded-lg transition-colors border shadow-sm bg-gray-800 border-gray-700 text-gray-400";
                    text.textContent = "LOCKED";
                }
            };

            // BPM
            document.getElementById('bpmSlider').oninput = (e) => {
                state.tempo = parseInt(e.target.value);
                document.getElementById('bpmDisplay').textContent = state.tempo;
            };

            // メトロノーム
            document.getElementById('metroBtn').onclick = () => {
                state.metronomeOn = !state.metronomeOn;
                document.getElementById('metroBtn').className = state.metronomeOn ? "p-2 rounded-lg transition-colors text-cyan-400 bg-cyan-900/30" : "p-2 rounded-lg transition-colors text-gray-500 hover:bg-gray-800";
            };

            // シーク
            document.getElementById('timelineContainer').onclick = (e) => {
                if (state.isPlaying) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const y = e.clientY - rect.top + e.currentTarget.scrollTop;
                state.currentBeat = Math.max(0, y / BEAT_HEIGHT);
            };

            // キーボード
            window.onkeydown = (e) => {
                if (e.repeat) return;
                if (e.code === 'ShiftLeft') { state.octaveShift = -1; updateKeyboardLabels(); return; }
                if (e.code === 'ShiftRight') { state.octaveShift = 1; updateKeyboardLabels(); return; }

                const k = KEY_DEF.find(kd => kd.key === e.key.toLowerCase());
                if (!k) return;
                
                getCtx();
                const freq = getFreq(k.offset, state.octaveShift);
                playHarp(freq, audioCtx.currentTime);
                
                const keyEl = document.getElementById(`key-${k.key}`);
                if (keyEl) keyEl.classList.add(k.type === 'white' ? 'key-active-white' : 'key-active-black');

                if (state.isRecording) {
                    activeRecording[k.key] = { start: state.currentBeat, time: audioCtx.currentTime, freq };
                }
            };

            window.onkeyup = (e) => {
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { state.octaveShift = 0; updateKeyboardLabels(); return; }
                
                const keyStr = e.key.toLowerCase();
                const k = KEY_DEF.find(kd => kd.key === keyStr);
                if (!k) return;

                const keyEl = document.getElementById(`key-${k.key}`);
                if (keyEl) keyEl.classList.remove('key-active-white', 'key-active-black');

                if (activeRecording[keyStr]) {
                    const rec = activeRecording[keyStr];
                    const dur = Math.max(0.15, (audioCtx.currentTime - rec.time) * (state.tempo / 60));
                    state.notes.push({ id: Date.now(), keyId: keyStr, start: rec.start, dur, freq: rec.freq });
                    delete activeRecording[keyStr];
                    drawNotes();
                }
            };

            // 設定
            document.getElementById('configBtn').onclick = () => document.getElementById('configModal').classList.remove('hidden');
            document.getElementById('closeConfig').onclick = () => document.getElementById('configModal').classList.add('hidden');
            document.getElementById('modalOk').onclick = () => document.getElementById('configModal').classList.add('hidden');
            
            document.getElementById('waveType').onchange = (e) => state.synth.type = e.target.value;
            document.getElementById('attackSlider').oninput = (e) => {
                state.synth.attack = parseFloat(e.target.value);
                document.getElementById('attackVal').textContent = e.target.value + 's';
            };
            document.getElementById('releaseSlider').oninput = (e) => {
                state.synth.release = parseFloat(e.target.value);
                document.getElementById('releaseVal').textContent = e.target.value + 's';
            };
        }
    </script>
</body>
</html>
